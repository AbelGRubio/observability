name: Tests

on:
  workflow_call:

env:
  PYTHONPATH: src
  PIP_CACHE_DIR: .cache/pip

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set PR token env
        env:
          PR_TOKEN_USER: ${{ secrets.PR_TOKEN_USER }}
        run: echo "PR_TOKEN_USER=${PR_TOKEN_USER}" >> $GITHUB_ENV

      - name: Skip if triggered by PR_TOKEN_USER
        if: github.actor != env.PR_TOKEN_USER
        run: echo "Running tests"

      - name: Block version commits
        run: |
          if [[ "${{ github.event.pull_request.title }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Version commit detected. Skipping tests."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Run tests with coverage
        run: |
          uv run pytest -v --tb=short --disable-warnings --maxfail=1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
