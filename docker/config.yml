receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
#  loki:
#    endpoint: loki:3100/loki/api/v1/push

  prometheus:
    endpoint: "0.0.0.0:9464"

  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [ otlp ]
      exporters: [ otlp ]

    metrics:
      receivers: [ otlp ]
      exporters: [ prometheus ]

#    logs:
#      receivers: [ otlp ]
#      exporters: [ loki ]