services:
  observability:
    image: ${REGISTRY_PATH}:${VERSION}
    container_name: observability
    ports:
      - 8000:8000
    env_file:
      - ../.env
    privileged: true
    volumes:
      - ../cfg/config.cfg:/cfg/config.cfg

  otel-collector:
    platform: linux/amd64
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    volumes:
      - ./config.yml:/etc/otel/config.yaml
#    volumes:
#      - otel_collector:/etc/otel
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "9464:9464"  # Prometheus metrics endpoint
    depends_on:
      - jaeger
    networks:
      - observer-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true  # OTLP gRPC habilitado
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC Thrift (opcional)
    networks:
      - observer-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yaml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - observer-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"  # UI Grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - observer-network
    volumes:
      - grafana_observability:/var/lib/grafana


networks:
  observer-network:
    driver: bridge

volumes:
  grafana_observability:
  otel_collector:
  prometheus:

