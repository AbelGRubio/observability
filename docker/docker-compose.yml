services:
  observability:
    image: ${REGISTRY_PATH}:${VERSION}
    container_name: observability
    ports:
      - 8000:8000
    env_file:
      - ../.env
    privileged: true
    environment:
      - OTEL_SERVICE_NAME=observability
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#      - OTEL_LOGS_EXPORTER=otlp
#      - OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED=true
    volumes:
      - ../cfg/config.cfg:/cfg/config.cfg
      - ../src:/app/src
    networks:
      - observer-network

  otel-collector:
    platform: linux/amd64
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    volumes:
      - ./config.yml:/etc/otel/config.yaml
    command: [ "--config=/etc/otel/config.yaml" ]
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # HTTP (útil)
      - "9464:9464"  # Prometheus metrics endpoint
    depends_on:
      - jaeger
    networks:
      - observer-network

  jaeger:
    platform: linux/amd64
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true  # OTLP gRPC habilitado
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC Thrift (opcional)
    networks:
      - observer-network

  prometheus:
    platform: linux/amd64
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - observer-network

  grafana:
    platform: linux/amd64
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"  # UI Grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - observer-network
    volumes:
      - grafana:/var/lib/grafana

  loki:
    platform: linux/amd64
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/loki.yaml
    command: -config.file=/etc/loki/loki.yaml
    networks:
      - observer-network

networks:
  observer-network:
    driver: bridge

volumes:
  grafana:
