services:
  observability:
    image: ${REGISTRY_PATH}:${VERSION}
    ports:
      - 8000:8000
    env_file:
      - ../.env
    privileged: true
    volumes:
      - ../cfg/config.cfg:/cfg/config.cfg
  
  otel-collector:
    image: otel/openobserver-network-collector-contrib:latest
    container_name: otel-collector
    volumes:
      - ./conf-services/otel-collector.yaml:/etc/otelcol/config.yaml
    command: [ "--config=/etc/otelcol/config.yaml" ]
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "9464:9464"  # Prometheus metrics endpoint
    depends_on:
      - jaeger
    networks:
      - observer-network
  
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true  # OTLP gRPC habilitado
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC Thrift (opcional)
    networks:
      - observer-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./conf-services/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - observer-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"  # UI Grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - observer-network
    volumes:
      - grafana_data:/var/lib/grafana


networks:
  observer-network:
    driver: bridge

volumes:
  grafana_data: